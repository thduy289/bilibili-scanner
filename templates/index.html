<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer"> <!-- Chống Bilibili chặn hiển thị ảnh -->
    <title>Bilibili Japan Scanner (Dark Mode)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
        }
        .form-control, .form-select {
            background-color: #0f172a;
            border-color: #334155;
            color: #f8fafc;
        }
        .form-control:focus, .form-select:focus {
            background-color: #0f172a;
            color: #ffffff;
            border-color: #38bdf8;
            box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25);
        }
        .poster-img {
            width: 90px;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            background-color: #334155;
        }
        .table-responsive {
            max-height: 550px;
            overflow-y: auto;
        }
        .table {
            --bs-table-bg: #1e293b;
            --bs-table-hover-bg: #334155;
            color: #f8fafc;
        }
        .sortable-header {
            cursor: pointer;
            user-select: none;
        }
        .sortable-header:hover {
            color: #38bdf8;
        }
    </style>
</head>
<body>
<div class="container py-4">
    <h3 class="mb-4 text-info fw-bold">🎌 Bilibili Japan Media Scanner <span class="fs-6 text-secondary fw-normal">(Sync Notion)</span></h3>

    <!-- Controls -->
    <div class="card p-3 mb-4 shadow">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label font-weight-bold text-light">Start ID</label>
                <input type="number" id="start_id" class="form-control" placeholder="VD: 2246000">
            </div>
            <div class="col-md-3">
                <label class="form-label font-weight-bold text-light">End ID</label>
                <input type="number" id="end_id" class="form-control" placeholder="VD: 2250000">
            </div>
            <div class="col-md-3">
                <label class="form-label text-light">Threads</label>
                <select id="threads" class="form-select">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label text-light">Delay (ms)</label>
                <select id="delay" class="form-select">
                    <option value="100">100</option>
                    <option value="200" selected>200</option>
                    <option value="500">500</option>
                </select>
            </div>
        </div>

        <div class="mt-3 d-flex gap-2">
            <button id="btn_start" class="btn btn-success fw-bold px-4" onclick="startScan()">Search</button>
            <button id="btn_stop" class="btn btn-danger fw-bold px-4" onclick="stopScan()" disabled>Stop</button>
        </div>
    </div>

    <!-- Status & Progress -->
    <div class="card p-3 mb-4 shadow">
        <div class="d-flex justify-content-between mb-2 fw-bold">
            <span id="lbl_progress" class="text-light">Đã quét: 0 / 0</span>
            <span id="lbl_found" class="text-success">Đã lưu Notion (Japan): 0</span>
        </div>
        <div class="progress" style="height: 20px;">
            <div id="progress_bar" class="progress-bar progress-bar-striped progress-bar-animated bg-info" style="width: 0%;">0%</div>
        </div>
    </div>

    <!-- Live Search & Table -->
    <div class="card p-3 shadow">
        <input type="text" id="table_filter" class="form-control mb-3" placeholder="🔍 Gõ từ khóa để lọc dữ liệu trong bảng..." onkeyup="filterTable()">
        
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark sticky-top">
                    <tr>
                        <th style="width: 110px;">Poster</th>
                        <th style="width: 150px;" class="sortable-header" onclick="toggleSort('id')" title="Bấm để sắp xếp theo Media ID">
                            Media ID <span id="sort_icon_id" class="text-info">⇅</span>
                        </th>
                        <th class="sortable-header" onclick="toggleSort('title')" title="Bấm để sắp xếp theo Title">
                            Title <span id="sort_icon_title" class="text-info">▲</span>
                        </th>
                        <th style="width: 120px;">Action</th>
                    </tr>
                </thead>
                <tbody id="table_body">
                    <!-- Dynamic Data -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let rawResults = [];
    let currentSortColumn = 'title'; // Mặc định sắp xếp theo Title
    let isSortAscending = true;      // Mặc định A-Z (tăng dần)

    const svgFallback = "data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%2290%22%20height%3D%22120%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2090%20120%22%3E%3Crect%20fill%3D%22%23334155%22%20width%3D%2290%22%20height%3D%22120%22%2F%3E%3Ctext%20fill%3D%22%2394a3b8%22%20font-size%3D%2212%22%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%3ENo%20Cover%3C%2Ftext%3E%3C%2Fsvg%3E";

    async function startScan() {
        const start_id = document.getElementById('start_id').value;
        const end_id = document.getElementById('end_id').value;
        
        if(!start_id || !end_id) {
            alert('Vui lòng nhập Start ID và End ID!');
            return;
        }

        const res = await fetch('/api/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                start_id, end_id,
                threads: document.getElementById('threads').value,
                delay: document.getElementById('delay').value
            })
        });

        const data = await res.json();
        if (res.ok) {
            document.getElementById('btn_start').disabled = true;
            document.getElementById('btn_stop').disabled = false;
        } else {
            alert(data.message);
        }
    }

    async function stopScan() {
        await fetch('/api/stop', {method: 'POST'});
        document.getElementById('btn_start').disabled = false;
        document.getElementById('btn_stop').disabled = true;
    }

    async function checkStatus() {
        const res = await fetch('/api/status');
        const data = await res.json();

        document.getElementById('lbl_progress').innerText = `Đã quét: ${data.scanned} / ${data.total}`;

        if (data.total > 0) {
            const pct = Math.round((data.scanned / data.total) * 100);
            const bar = document.getElementById('progress_bar');
            bar.style.width = pct + '%';
            bar.innerText = pct + '%';
        }

        if (data.is_running) {
            document.getElementById('btn_start').disabled = true;
            document.getElementById('btn_stop').disabled = false;
            fetchResults();
        } else {
            document.getElementById('btn_start').disabled = false;
            document.getElementById('btn_stop').disabled = true;
        }
    }

    async function fetchResults() {
        const res = await fetch('/api/results');
        rawResults = await res.json();
        document.getElementById('lbl_found').innerText = `Đã lưu Notion (Japan): ${rawResults.length}`;
        renderTable();
    }

    function toggleSort(column) {
        if (currentSortColumn === column) {
            isSortAscending = !isSortAscending;
        } else {
            currentSortColumn = column;
            isSortAscending = true;
        }
        renderTable();
    }

    function sortData(list) {
        return list.sort((a, b) => {
            let valA, valB;
            if (currentSortColumn === 'id') {
                valA = parseInt(a.id) || 0;
                valB = parseInt(b.id) || 0;
            } else {
                valA = String(a.title || '').toLowerCase();
                valB = String(b.title || '').toLowerCase();
            }

            if (valA < valB) return isSortAscending ? -1 : 1;
            if (valA > valB) return isSortAscending ? 1 : -1;
            return 0;
        });
    }

    function renderTable() {
        const tbody = document.getElementById('table_body');
        const sortedData = sortData([...rawResults]);

        // Cập nhật icon mũi tên sắp xếp
        document.getElementById('sort_icon_id').innerText = (currentSortColumn === 'id') ? (isSortAscending ? ' ▲' : ' ▼') : ' ⇅';
        document.getElementById('sort_icon_title').innerText = (currentSortColumn === 'title') ? (isSortAscending ? ' ▲' : ' ▼') : ' ⇅';

        tbody.innerHTML = sortedData.map(item => `
            <tr>
                <td>
                    <img src="${item.image || svgFallback}" 
                         class="poster-img" 
                         referrerpolicy="no-referrer" 
                         onerror="this.src='${svgFallback}'">
                </td>
                <td class="fw-bold text-info">${item.id}</td>
                <td class="fw-semibold">${item.title}</td>
                <td><a href="${item.url}" target="_blank" class="btn btn-sm btn-outline-info">Mở Link ↗</a></td>
            </tr>
        `).join('');

        filterTable();
    }

    function filterTable() {
        const query = document.getElementById('table_filter').value.toLowerCase();
        const rows = document.querySelectorAll('#table_body tr');
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(query) ? '' : 'none';
        });
    }

    setInterval(checkStatus, 3000);
    fetchResults();
</script>
</body>
</html>
